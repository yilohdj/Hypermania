name: build-on-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneOSX
          - targetPlatform: StandaloneWindows64
          - targetPlatform: StandaloneLinux64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Hypermania/Library
          key: >-
            Hypermania-Library-${{ matrix.targetPlatform }}-${{
            hashFiles(
              'Hypermania/Packages/packages-lock.json',
              'Hypermania/ProjectSettings/ProjectVersion.txt',
              'Hypermania/ProjectSettings/ProjectSettings.asset'
            ) }}
          restore-keys: |
            Hypermania-Library-${{ matrix.targetPlatform }}-
            Hypermania-Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Hypermania
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: Hypermania ${{ github.ref_name }}

      - name: Zip build
        run: |
          sudo cp Hypermania/steam_appid.txt build/${{ matrix.targetPlatform }}/
          cd build/${{ matrix.targetPlatform }}
          zip -r ../../Hypermania-${{ matrix.targetPlatform }}-${GITHUB_REF_NAME}.zip .

      - name: Upload packaged build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.targetPlatform }}
          path: Hypermania-${{ matrix.targetPlatform }}-${{ github.ref_name }}.zip
          if-no-files-found: error

  createRelease:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: buildForAllSupportedPlatforms

    steps:
      - name: Download all packaged builds
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show downloaded files
        run: find release-assets -type f

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
